<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NinjaBot - Advanced Trading Analytics</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151932;
            --bg-card: #1a1f3a;
            --border-color: #2a2f4a;
            --text-primary: #e4e7eb;
            --text-secondary: #9ca3af;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-yellow: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: "🥷";
            font-size: 1.8rem;
        }

        .pair-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            flex: 1;
            justify-content: center;
        }

        .pair-btn {
            padding: 0.5rem 1.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .pair-btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .pair-btn.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-color: transparent;
            color: white;
            box-shadow: var(--shadow);
        }

        .history-btn {
            padding: 0.5rem 1.25rem;
            background: var(--accent-green);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .history-btn:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        /* Main Container */
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
        }

        .stat-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-change {
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .positive {
            color: var(--accent-green);
        }

        .negative {
            color: var(--accent-red);
        }

        .neutral {
            color: var(--text-secondary);
        }

        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .chart-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .chart-controls {
            display: flex;
            gap: 0.5rem;
        }

        .control-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .control-btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .control-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        #main-chart, #equity-chart, #performance-chart {
            width: 100%;
            height: 600px;
        }

        #equity-chart {
            height: 300px;
        }

        #performance-chart {
            height: 400px;
        }

        /* Trade Table */
        .trade-table-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .trade-table {
            width: 100%;
            border-collapse: collapse;
        }

        .trade-table thead {
            background: var(--bg-secondary);
        }

        .trade-table th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .trade-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        .trade-table tbody tr:hover {
            background: var(--bg-secondary);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-buy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .badge-sell {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .badge-profit {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .badge-loss {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            font-size: 1.25rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .pair-selector {
                justify-content: flex-start;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            #main-chart, #equity-chart, #performance-chart {
                height: 400px;
            }
        }

        /* Tooltips */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            text-align: center;
            border-radius: 6px;
            padding: 0.5rem;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.75rem;
            border: 1px solid var(--border-color);
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* ── Backtest Summary Panel ───────────────────────────────── */
        #backtest-summary { margin-top: 1.5rem; }

        .summary-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .summary-header h2 { font-size: 1.1rem; font-weight: 700; }
        .summary-strategy {
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.25rem 0.75rem;
            font-family: monospace;
        }

        .summary-kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .kpi-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem 1.1rem;
        }
        .kpi-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
        }
        .kpi-value {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .kpi-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
        }

        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        @media(max-width:860px){ .summary-row{ grid-template-columns:1fr; } }

        .summary-sub-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem 1.1rem;
        }
        .summary-sub-card h4 {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--accent-purple);
            margin-bottom: 0.85rem;
        }

        /* Per-pair table */
        .pair-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .pair-table th {
            text-align: right;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            padding: 0.35rem 0.6rem;
            border-bottom: 1px solid var(--border-color);
        }
        .pair-table th:first-child { text-align: left; }
        .pair-table td {
            text-align: right;
            padding: 0.45rem 0.6rem;
            border-bottom: 1px solid rgba(42,47,74,0.5);
            font-variant-numeric: tabular-nums;
        }
        .pair-table td:first-child { text-align: left; font-weight: 600; color: var(--accent-blue); }
        .pair-table tr:last-child td { border-bottom: none; font-weight: 600; color: var(--text-primary); background: rgba(42,47,74,0.3); }

        /* Confidence interval rows */
        .ci-grid { display: flex; flex-direction: column; gap: 0.5rem; }
        .ci-pair-label { font-size: 0.75rem; font-weight: 700; color: var(--accent-blue); margin-top: 0.5rem; margin-bottom: 0.2rem; }
        .ci-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .ci-name { color: var(--text-secondary); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .ci-value { font-weight: 600; font-variant-numeric: tabular-nums; }
        .ci-range { font-size: 0.72rem; color: var(--text-secondary); }

        /* Return histogram */
        .hist-bar-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            margin-bottom: 0.3rem;
            font-variant-numeric: tabular-nums;
        }
        .hist-label { color: var(--text-secondary); width: 110px; text-align: right; flex-shrink: 0; }
        .hist-bar-wrap { flex: 1; background: rgba(42,47,74,0.5); border-radius: 3px; height: 14px; overflow: hidden; }
        .hist-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
        .hist-count { width: 38px; text-align: right; color: var(--text-secondary); flex-shrink: 0; }
        .hist-pct { width: 42px; text-align: right; flex-shrink: 0; }

        /* Wallet state */
        .wallet-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.85rem; border-bottom: 1px solid rgba(42,47,74,0.5); }
        .wallet-row:last-child { border-bottom: none; }
        .wallet-asset { color: var(--accent-blue); font-weight: 600; }
        .wallet-val { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo"><a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:0.5rem;">NinjaBot Analytics</a></div>
            <nav class="pair-selector" id="pair-selector">
                {{range $val := .pairs}}
                <a class="pair-btn {{if eq $.pair $val}}active{{end}}" href="/enhanced?pair={{ $val }}">{{ $val }}</a>
                {{end}}
            </nav>
            <div style="display: flex; gap: 0.5rem;">
                <a class="history-btn" href="/history?pair={{ $.pair }}">📊 History</a>
                <a class="history-btn" href="/?pair={{ $.pair }}" style="background: var(--bg-card); color: var(--text-secondary);">Classic View</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <span>Loading trading data...</span>
        </div>

        <div id="content" style="display: none;">
            <!-- Stats Grid -->
            <div class="stats-grid" id="stats-grid"></div>

            <!-- Main Price Chart -->
            <div class="chart-container">
                <div class="chart-header">
                    <h2 class="chart-title">Price Action & Orders</h2>
                    <div class="chart-controls">
                        <button class="control-btn active" onclick="toggleIndicators()">Indicators</button>
                        <button class="control-btn" onclick="toggleVolume()">Volume</button>
                        <button class="control-btn" onclick="resetZoom()">Reset Zoom</button>
                    </div>
                </div>
                <div id="main-chart"></div>
            </div>

            <!-- Equity Chart -->
            <div class="chart-container">
                <div class="chart-header">
                    <h2 class="chart-title">Portfolio Equity & Position</h2>
                </div>
                <div id="equity-chart"></div>
            </div>

            <!-- Performance Metrics -->
            <div class="chart-container">
                <div class="chart-header">
                    <h2 class="chart-title">Performance Analysis</h2>
                </div>
                <div id="performance-chart"></div>
            </div>

            <!-- Trade History Table -->
            <div class="trade-table-container">
                <h2 class="chart-title" style="margin-bottom: 1rem;">Recent Trades</h2>
                <table class="trade-table" id="trade-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Side</th>
                            <th>Type</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Value</th>
                            <th>Profit</th>
                        </tr>
                    </thead>
                    <tbody id="trade-table-body"></tbody>
                </table>
            </div>

            <!-- Backtest Summary (populated by /api/summary if available) -->
            <div id="backtest-summary" style="display:none"></div>
        </div>
    </div>

    <script defer src="/assets/chart_enhanced.js"></script>

    <script>
    // ── Backtest Summary Panel ────────────────────────────────────────────────
    (function () {
        'use strict';

        function fmt(n, d) {
            return Number(n).toLocaleString(undefined, { minimumFractionDigits: d ?? 2, maximumFractionDigits: d ?? 2 });
        }
        function fmtPct(n) {
            var s = n >= 0 ? '+' : '';
            return s + fmt(n, 2) + '%';
        }
        function colorPct(n) {
            return n >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
        }

        function buildKPI(label, value, sub, color) {
            return '<div class="kpi-card">'
                + '<div class="kpi-label">' + label + '</div>'
                + '<div class="kpi-value" style="color:' + (color || 'var(--text-primary)') + '">' + value + '</div>'
                + (sub ? '<div class="kpi-sub">' + sub + '</div>' : '')
                + '</div>';
        }

        function renderSummary(d) {
            var section = document.getElementById('backtest-summary');
            if (!section) return;
            section.style.display = '';

            // ── Strategy tag
            var html = '<div class="chart-container" style="padding:1.5rem">';
            html += '<div class="summary-header">';
            html += '<h2 class="chart-title" style="margin:0">📊 Backtest Summary</h2>';
            html += '<span class="summary-strategy">' + d.strategy_info + '</span>';
            html += '</div>';

            // ── Top-level KPIs
            var grossColor = colorPct(d.gross_profit_pct);
            var ddColor = d.max_drawdown_pct <= 0 ? 'var(--accent-red)' : 'var(--accent-green)';
            html += '<div class="summary-kpi-grid">';
            html += buildKPI('Initial Capital', fmt(d.initial_capital) + ' ' + d.base_coin, null, null);
            html += buildKPI('Final Portfolio', fmt(d.final_portfolio) + ' ' + d.base_coin,
                fmtPct(d.gross_profit_pct) + ' gross return', grossColor);
            html += buildKPI('Gross Profit', fmt(d.gross_profit) + ' ' + d.base_coin, null, grossColor);
            html += buildKPI('Win Rate', fmt(d.win_rate, 1) + '%',
                d.total_wins + ' W / ' + d.total_losses + ' L / ' + d.total_trades + ' trades',
                d.win_rate >= 50 ? 'var(--accent-green)' : 'var(--accent-red)');
            html += buildKPI('Avg Payoff', fmt(d.avg_payoff, 3), 'avg win / avg loss ratio', null);
            html += buildKPI('Profit Factor', fmt(d.avg_profit_factor, 3), 'gross win / gross loss', null);
            html += buildKPI('SQN', fmt(d.avg_sqn, 1), 'System Quality Number', null);
            html += buildKPI('Max Drawdown', fmt(d.max_drawdown_pct, 2) + '%', null, ddColor);
            html += buildKPI('Total Volume', fmt(d.total_volume) + ' ' + d.base_coin, null, null);
            html += '</div>'; // kpi-grid

            // ── Per-pair performance table
            html += '<div class="summary-sub-card" style="margin-bottom:1rem">';
            html += '<h4>Per-Pair Performance</h4>';
            html += '<table class="pair-table">';
            html += '<thead><tr>';
            ['Pair','Trades','Win','Loss','% Win','Payoff','Pr.Fact','SQN','Profit','Volume'].forEach(function(h){
                html += '<th>' + h + '</th>';
            });
            html += '</tr></thead><tbody>';

            d.pairs.forEach(function(p) {
                var winColor = p.win_pct >= 50 ? 'var(--accent-green)' : 'var(--accent-red)';
                html += '<tr>'
                    + '<td>' + p.pair + '</td>'
                    + '<td>' + p.trades + '</td>'
                    + '<td style="color:var(--accent-green)">' + p.win + '</td>'
                    + '<td style="color:var(--accent-red)">' + p.loss + '</td>'
                    + '<td style="color:' + winColor + '">' + fmt(p.win_pct,1) + '%</td>'
                    + '<td>' + fmt(p.payoff,3) + '</td>'
                    + '<td>' + fmt(p.profit_factor,3) + '</td>'
                    + '<td>' + fmt(p.sqn,1) + '</td>'
                    + '<td style="color:' + colorPct(p.profit) + '">' + fmt(p.profit) + '</td>'
                    + '<td>' + fmt(p.volume) + '</td>'
                    + '</tr>';
            });
            // totals row
            var totWinColor = d.win_rate >= 50 ? 'var(--accent-green)' : 'var(--accent-red)';
            html += '<tr>'
                + '<td>TOTAL</td>'
                + '<td>' + d.total_trades + '</td>'
                + '<td style="color:var(--accent-green)">' + d.total_wins + '</td>'
                + '<td style="color:var(--accent-red)">' + d.total_losses + '</td>'
                + '<td style="color:' + totWinColor + '">' + fmt(d.win_rate,1) + '%</td>'
                + '<td>' + fmt(d.avg_payoff,3) + '</td>'
                + '<td>' + fmt(d.avg_profit_factor,3) + '</td>'
                + '<td>' + fmt(d.avg_sqn,1) + '</td>'
                + '<td style="color:' + colorPct(d.total_profit) + '">' + fmt(d.total_profit) + '</td>'
                + '<td>' + fmt(d.total_volume) + '</td>'
                + '</tr>';
            html += '</tbody></table></div>';

            // ── Two-column row: Confidence Intervals + Return Histogram
            html += '<div class="summary-row">';

            // Confidence Intervals
            html += '<div class="summary-sub-card">';
            html += '<h4>Confidence Intervals (95%)</h4><div class="ci-grid">';
            d.pairs.forEach(function(p) {
                html += '<div class="ci-pair-label">' + p.pair + '</div>';
                [
                    { name:'Return',      mean: fmt(p.ci_return_mean,2)+'%', range: fmt(p.ci_return_lower,2)+'% ~ '+fmt(p.ci_return_upper,2)+'%' },
                    { name:'Payoff',      mean: fmt(p.ci_payoff_mean,2),     range: fmt(p.ci_payoff_lower,2)+' ~ '+fmt(p.ci_payoff_upper,2) },
                    { name:'Prof.Factor', mean: fmt(p.ci_pf_mean,2),         range: fmt(p.ci_pf_lower,2)+' ~ '+fmt(p.ci_pf_upper,2) },
                ].forEach(function(row) {
                    html += '<div class="ci-row">'
                        + '<span class="ci-name">' + row.name + '</span>'
                        + '<span class="ci-value">' + row.mean + '</span>'
                        + '<span class="ci-range">(' + row.range + ')</span>'
                        + '</div>';
                });
            });
            html += '</div></div>'; // ci-grid + sub-card

            // Return Distribution Histogram
            html += '<div class="summary-sub-card">';
            html += '<h4>Return Distribution (%)</h4>';
            if (d.return_buckets && d.return_buckets.length) {
                var maxPct = Math.max.apply(null, d.return_buckets.map(function(b){ return b.pct; }));
                d.return_buckets.forEach(function(b) {
                    var widthPct = maxPct > 0 ? (b.pct / maxPct * 100) : 0;
                    var barColor = b.from < 0 ? 'var(--accent-red)' : 'var(--accent-green)';
                    if (b.from < 0 && b.to > 0) barColor = 'var(--accent-yellow)';
                    html += '<div class="hist-bar-row">'
                        + '<span class="hist-label">' + b.label + '</span>'
                        + '<div class="hist-bar-wrap"><div class="hist-bar-fill" style="width:'+widthPct+'%;background:'+barColor+'"></div></div>'
                        + '<span class="hist-pct" style="color:' + barColor + '">' + fmt(b.pct,1) + '%</span>'
                        + '<span class="hist-count">(' + b.count + ')</span>'
                        + '</div>';
                });
            } else {
                html += '<p style="color:var(--text-secondary);font-size:.8rem">Not enough data.</p>';
            }
            html += '</div>'; // sub-card

            html += '</div>'; // summary-row

            // ── Final Wallet + Risk & Volume
            html += '<div class="summary-row">';

            // Final Wallet
            html += '<div class="summary-sub-card">';
            html += '<h4>Final Wallet</h4>';
            d.final_assets.forEach(function(a) {
                html += '<div class="wallet-row">'
                    + '<span class="wallet-asset">' + a.asset + '</span>'
                    + '<span class="wallet-val">' + fmt(a.value_usdt) + ' USDT</span>'
                    + '</div>';
            });
            html += '<div class="wallet-row">'
                + '<span class="wallet-asset">' + d.base_coin + '</span>'
                + '<span class="wallet-val">' + fmt(d.base_balance) + ' USDT</span>'
                + '</div>';
            html += '<div class="wallet-row" style="margin-top:.5rem;border-top:1px solid var(--border-color);padding-top:.5rem">'
                + '<span style="font-weight:700">Total Portfolio</span>'
                + '<span class="wallet-val" style="font-weight:700;color:' + colorPct(d.gross_profit) + '">' + fmt(d.final_portfolio) + ' USDT</span>'
                + '</div>';
            html += '</div>'; // sub-card

            // Risk & Volume
            html += '<div class="summary-sub-card">';
            html += '<h4>Risk &amp; Returns</h4>';
            [
                { label:'Start Portfolio',  value: fmt(d.initial_capital) + ' USDT' },
                { label:'Final Portfolio',  value: fmt(d.final_portfolio) + ' USDT' },
                { label:'Gross Profit',     value: fmt(d.gross_profit) + ' USDT (' + fmtPct(d.gross_profit_pct) + ')', color: colorPct(d.gross_profit) },
                { label:'Max Drawdown',     value: fmt(d.max_drawdown_pct,2) + '%', color: 'var(--accent-red)' },
                { label:'Total Volume',     value: fmt(d.total_volume) + ' USDT' },
            ].forEach(function(row) {
                html += '<div class="wallet-row">'
                    + '<span style="color:var(--text-secondary);font-size:.8rem">' + row.label + '</span>'
                    + '<span class="wallet-val" style="font-weight:600' + (row.color ? ';color:'+row.color : '') + '">' + row.value + '</span>'
                    + '</div>';
            });
            html += '</div>'; // sub-card

            html += '</div>'; // summary-row
            html += '</div>'; // chart-container

            section.innerHTML = html;
        }

        // Try to load summary after the enhanced chart JS has run.
        window.addEventListener('load', function () {
            fetch('/api/summary')
                .then(function (res) {
                    if (!res.ok) return null;
                    return res.json();
                })
                .then(function (data) {
                    if (data) renderSummary(data);
                })
                .catch(function () { /* endpoint not available – skip */ });
        });
    })();
    </script>
</body>
</html>
